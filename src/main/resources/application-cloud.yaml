spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      minimum-idle: 0
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

app:
  initial-balance: 500000
  notifications:
    enabled: true
    channels:
      - email
      - sms
