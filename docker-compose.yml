version: "3.8"

services:
  mongo:
    image: mongo:6.0
    container_name: fund-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: test_fund_db
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:16
    container_name: fund-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: test_sql_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  mongo-data:
  pg-data:
